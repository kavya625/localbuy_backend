#server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/localbuy_db
#spring.datasource.url=jdbc:postgresql://localhost:3306/localbuy_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT
app.jwt.secret=LocalBuySecretKey2024SuperSecureJWTSigningKeyForProduction
app.jwt.expiration=86400000

# Logging
logging.level.com.localbuy=INFO
